<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner App</title>

  <!-- Connect CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Main Container -->
  <div class="container">

    <!-- Heading -->
    <h1>📚 Study Planner</h1>
    <p>Plan your studies and stay productive.</p>

    <!-- Input Section -->
    <div class="task-box">

      <!-- Subject -->
      <label for="subject">Subject</label>
      <input 
        type="text" 
        id="subject" 
        placeholder="Enter subject name"
      />

      <!-- Task -->
      <label for="task">Task</label>
      <input 
        type="text" 
        id="task" 
        placeholder="Enter task details"
      />

      <!-- Date -->
      <label for="date">Study Date</label>
      <input 
        type="date" 
        id="date"
      />

      <!-- Button -->
      <button id="addBtn">Add Task</button>

    </div>

    <!-- Task List -->
    <div class="list-box">
      <h2>📌 My Tasks</h2>
      <ul id="taskList"></ul>
    </div>

  </div>

  <!-- Connect JavaScript -->
  <script src="script.js"></script>

</body>
</html>
